<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大模型 API 对话框</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        #output {
            white-space: pre-wrap;
            font-family: monospace;
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
            max-width: 600px;
            margin-top: 20px;
            height: 300px;
            overflow-y: auto;
        }

        #chatBox {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        #inputBox {
            width: 80%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        #sendBtn {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #sendBtn:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>
    <h1>与大模型对话</h1>
    <p>请输入问题或对话内容：</p>

    <!-- 显示对话输出 -->
    <div id="output"></div>

    <!-- 用户输入框和发送按钮 -->
    <div id="chatBox">
        <input type="text" id="inputBox" placeholder="输入您的问题..." />
        <button id="sendBtn">发送</button>
    </div>

    <script>
        // 设置代理和 API URL
        const apiUrl = 'http://129.211.183.59:11434/api/generate';  // API 地址

        const outputDiv = document.getElementById('output');
        const inputBox = document.getElementById('inputBox');
        const sendBtn = document.getElementById('sendBtn');

        // 发送请求并流式处理响应
        function sendMessage(prompt) {
            const requestData = {
                model: 'deepseek-r1:7b',
                prompt: prompt,
                other_params: '其他参数',
            };

            // 发送 POST 请求并流式处理响应
            fetch(apiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(requestData),
            })
                .then(response => {
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let result = '';

                    // 逐块读取响应
                    const readStream = () => {
                        reader.read().then(({ done, value }) => {
                            if (done) {
                                console.log('流式读取完成');
                                outputDiv.innerHTML += "\n[结束]";
                                return;
                            }

                            // 将流中的字节解码为字符串
                            const chunk = decoder.decode(value, { stream: true });
                            try {
                                // 尝试将解码后的字符串解析为 JSON
                                const parsedChunk = JSON.parse(chunk);
                                if (parsedChunk && parsedChunk.response) {
                                    // 从解析的 JSON 中提取响应字段
                                    result += parsedChunk.response;
                                }
                            } catch (error) {
                                console.error('解析 JSON 出错:', error);
                                result += '[解析错误]';
                            }

                            // 每次获取到新数据就更新显示
                            outputDiv.innerHTML = result;
                            outputDiv.scrollTop = outputDiv.scrollHeight;  // 自动滚动到最底部

                            // 继续读取下一个数据块
                            readStream();
                        }).catch(error => {
                            console.error('读取流失败:', error);
                            outputDiv.innerHTML += "\n[出错]";
                        });
                    };

                    // 开始流式读取
                    readStream();
                })
                .catch(error => {
                    console.error('请求失败:', error);
                    outputDiv.innerHTML += "\n[请求失败]";
                });
        }

        // 监听发送按钮的点击事件
        sendBtn.addEventListener('click', () => {
            const prompt = inputBox.value.trim();
            if (prompt) {
                // 显示用户输入
                outputDiv.innerHTML += `你: ${prompt}\n`;

                // 清空输入框
                inputBox.value = '';

                // 发送请求并显示模型的回答
                sendMessage(prompt);
            }
        });

        // 监听回车键发送消息
        inputBox.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                sendBtn.click();
            }
        });
    </script>
</body>

</html>
